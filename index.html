<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestell-App</title>
    <link rel="icon" href="./assets/icons/fav-icon.svg" type="image/x-icon" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./styles/standart.css">
    <link rel="stylesheet" href="./styles/assets.css">
    <link rel="stylesheet" href="./styles/fonts.css">
    <script src="./scripts/db.js" defer></script>
    <script src="./scripts/template.js" defer></script>
    <script src="script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>

<body onload="init()">
    <header class="page-header">
        <section class="header-content">
            <div>
                <img src="./assets/img/main-logo.svg" alt="Logo">
            </div>
            <div>
                <button class="hamburger-menu-btn" onclick="openDialog()"><img src="./assets/img/hamburger-menu.svg" alt="Menü"></button>
            </div>
        </section>
    </header>

    <main>
        <section class="hero-section">
            <div class="hero-image-content">
                <img class="hero-image" src="./assets/img/hero.jpg" alt="hero-image">
                <img class="burger-img" src="./assets/img/burger-logo.svg" alt="Burger Image">
            </div>
            <h1><span class="headline">Burger</span>House</h1>
            <h3 class="headline-description">The best of Burgers, Pizza, and Greens, all in one great place.</h3>
        </section>

        <section id="product_list" class="product-list">

            <section id="burger-section">
                <div class="color-container">
                    <div class="seperator-content">
                        <img src="./assets/img/burger_seperator.svg" alt="Burger">
                        <h2>Burger&Sandwiches</h2>
                    </div>
                </div>
                <div class="food-list burger-list" id="burger-list"></div>
            </section>

            <section id="pizza-section">
                <div class="color-container">
                    <div class="seperator-content">
                        <img src="./assets/img/pizza_seperator.svg" alt="Burger">
                        <h2>Pizza</h2>
                    </div>
                </div>
                <div id="pizza-list"></div>
            </section>

            <section id="salat-section">
                <div class="color-container">
                    <div class="seperator-content">
                        <img src="./assets/img/salat_seperator.svg" alt="Burger">
                        <h2>Salat</h2>
                    </div>
                </div>
                <div id="salat-list"></div>
            </section>

        </section>
    </main>

    <footer class="page-footer">
        <section class="page-footer-content">
            <p>© 2025 BurgerHouse</p>
            <a href="#">imprint</a>
            <a href="#">Cookie Preferences</a>
        </section>
    </footer>

    <dialog id="testDialog">huhh</dialog>
</body>

</html>

        <div class="test">
        <div class="dish-image-container">
            <img src="${dish.image}" alt="${dishes.name}">
        </div>
        <div class="dish-information-container">
            <h3 class="dish-headline">${dish.name}</h3>
            <p class="dish-description">${dish.indigredients}</p>
        </div>
        <div class="dish-price">
            <p>${dish.price}</p>
            <button class="basket-btn"><img src="${dish.button}" alt="Hinzufügen"></button> 
        </div>
        </div>
    </div>
