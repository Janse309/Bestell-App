<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestell-App</title>
    <link rel="icon" href="./assets/icons/fav-icon.svg" type="image/x-icon" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./styles/standart.css">
    <link rel="stylesheet" href="./styles/assets.css">
    <script src="script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>

<body>
    <header class="page-header">
        <section class="header-content">
            <div>
                <img src="./assets/img/main-logo.svg" alt="Logo">
            </div>
            <div>
                <button onclick="openDialog()"><img src="./assets/img/hamburger-menu.svg" alt="Menü"></button>
            </div>
        </section>
    </header>

    <main>
        <section class="hero-section">
            <div class="hero-image-content">
                <img class="hero-image" src="./assets/img/hero.jpg" alt="hero-image">
                <img class="burger-img" src="./assets/img/burger-logo.svg" alt="Burger Image">
            </div>
        </section>

        <h1><span class="headline">Burger</span>House</h1>
        <h3 class="headline-description">The best of Burgers, Pizza, and Greens, all in one great place.</h3>

        </section>

        <section class="product-list">

            <section id="burger-section">
                <div class="seperator-content">
                    <img src="./assets/img/burger_seperator.svg" alt="Burger">
                    <h2>Burger&Sandwiches</h2>

                </div>
            </section>
            <section id="pizza-section">
                <div class="seperator-content">
                    <img src="./assets/img/pizza_seperator.svg" alt="Burger">
                    <h2>Pizza</h2>

                </div>
            </section>
            <section id="salat-section">
                <div class="seperator-content">
                    <img src="./assets/img/salat_seperator.svg" alt="Burger">
                    <h2>Salat</h2>

                </div>
            </section>


        </section>
    </main>

    <footer></footer>

    <dialog id="testDialog">huhh</dialog>
</body>

</html>
