<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestell-App</title>
    <link rel="icon" href="./assets/icons/fav-icon.svg" type="image/x-icon" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./styles/standart.css">
    <link rel="stylesheet" href="./styles/assets.css">
    <link rel="stylesheet" href="./styles/fonts.css">
    <link rel="stylesheet" href="./styles/basket.css">
    <script src="./scripts/db.js" defer></script>
    <script src="./scripts/template.js" defer></script>
    <script src="script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>

<body onload="init()">
    <header class="page-header">
        <section class="header-content">
            <div>
                <img src="./assets/img/main-logo.svg" alt="Logo">
            </div>
            <div>
                <button class="hamburger-menu-btn"><img src="./assets/img/hamburger-menu.svg" alt="Menü"></button>
            </div>
        </section>
    </header>

    <main>
        <section class="hero-section">
            <div class="hero-image-content">
                <img class="hero-img" src="./assets/img/hero.jpg" alt="hero-image">
                <img class="burger-img" src="./assets/img/burger-logo.svg" alt="Burger Image">
            </div>
            <div class="hero-headline-section">
                <h1><span class="hero-headline">Burger</span>House</h1>
                <h3 class="headline-description">The best of Burgers, Pizza, and Greens, all in one great place.</h3>
            </div>
        </section>

        <div class="splitt_view_container">
            <section id="product_list" class="product-list ">

                <section class="food-container" id="burger-section">
                    <div class="color-container">
                        <div class="seperator-content wrapper">
                            <img src="./assets/img/burger_seperator.svg" alt="Burger">
                            <h2>Burger&Sandwiches</h2>
                        </div>
                    </div>
                    <div class="food-list" id="burger-list"></div>
                </section>

                <section class="food-container" id="pizza-section">
                    <div class="color-container">
                        <div class="seperator-content wrapper">
                            <img src="./assets/img/pizza_seperator.svg" alt="Burger">
                            <h2>Pizza</h2>
                        </div>
                    </div>
                    <div class="food-list" id="pizza-list"></div>
                </section>

                <section class="food-container" id="salat-section">
                    <div class="color-container">
                        <div class="seperator-content wrapper">
                            <img src="./assets/img/salat_seperator.svg" alt="Burger">
                            <h2>Salat</h2>
                        </div>
                    </div>
                    <div class="food-list" id="salat-list"></div>
                </section>

            </section>

            <aside id="basket-modal" class="basket-wrapper d_none">
                <section class="basket">
                    <div>
                        <h2 class="basket-headline">Warenkorb</h2>
                        <div id="basket-list"></div>
                    </div>
                    <div class="totals">
                        <div class="basket-text">
                            <p>Zwischensumme:</p>
                            <p class="calculated-price" id="subtotal">0,00 €</p>
                        </div>
                        <div class="basket-text border">
                            <p>Lieferkosten:</p>
                            <p class="calculated-price">3,00 €</p>
                        </div>
                        <div >
                            <div class="basket-text">
                                <p>Gesamt:</p>
                                <p class="calculated-price" id="total">0,00 €</p>
                            </div>
                            <button class="order-btn">Buy now</button>
                        </div>
                    </div>
                </section>
            </aside>


        </div>
    </main>

    <footer class="page-footer">
        <section class="page-footer-content">
            <p>© 2025 BurgerHouse</p>
            <a href="#">imprint</a>
            <a href="#">Cookie Preferences</a>
        </section>
    </footer>




</body>

</html>
